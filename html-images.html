<h1>HTML Images</h1>

<h2>Explanation</h2>

<p>
  HTML images are displayed using the img tag. Images do not have a closing tag.
</p>

<h2>Example</h2>

<pre style="background: #f4f4f4; padding: 10px">
&lt;img src="cat.jpg" alt="Cat" width="200"&gt;
</pre>

<h2>My Notes</h2>

<p>
  The src attribute specifies the image path. The alt attribute describes the
  image.
</p>
