<h1>HTML Links</h1>

<h2>Explanation</h2>

<p>
HTML links are used to navigate between web pages.
The <a> tag is used to create a link.
</p>

<h2>Example</h2>

<pre style="background:#f4f4f4; padding:10px;">
&lt;a href="https://google.com"&gt;Visit Google&lt;/a&gt;
</pre>

<h2>My Notes</h2>

<p>
The href attribute specifies the destination of the link.
</p>
